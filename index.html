<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Veste Deda | Fashion & Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fff; color: #1a1a1a; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* GRID ESTILO SHEIN */
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
        @media (min-width: 768px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }

        /* ABAS DE NAVEGAÇÃO (Estilo Riachuelo) */
        .tab-active { border-bottom: 3px solid #000; color: #000; font-weight: 800; }
        .tab-inactive { color: #999; font-weight: 500; }

        .gold-tag { background-color: #C5A572; color: white; padding: 2px 8px; font-size: 9px; border-radius: 2px; }
        .delete-btn { display: none; }
        .group:hover .delete-btn { display: flex; }
        
        .hidden { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-white border-b border-gray-100">
        <div class="p-4 text-center">
            <h1 class="font-serif text-3xl font-bold tracking-tighter uppercase">Me Veste <span class="text-[#C5A572]">Deda</span></h1>
        </div>
        
        <div class="flex justify-around border-t border-gray-50">
            <button onclick="switchTab('looks')" id="btn-looks" class="flex-1 py-3 text-xs uppercase tracking-widest tab-active transition-all">Looks Prontos</button>
            <button onclick="switchTab('costuras')" id="btn-costuras" class="flex-1 py-3 text-xs uppercase tracking-widest tab-inactive transition-all">Costuras & Ajustes</button>
        </div>
    </header>

    <section class="p-4 bg-[#FAF9F6]">
        <div class="border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center">
            <p id="upload-label" class="text-[10px] font-bold text-gray-400 uppercase mb-3">Adicionar ao Catálogo de Looks</p>
            <label class="cursor-pointer inline-flex items-center gap-2 bg-black text-white px-6 py-3 rounded-full active:scale-95 transition shadow-lg">
                <i class="fa-solid fa-camera"></i>
                <span class="text-[10px] font-bold uppercase">Subir Foto</span>
                <input type="file" id="inputFoto" class="hidden" accept="image/*">
            </label>
        </div>
    </section>

    <main class="max-w-7xl mx-auto min-h-screen">
        
        <div id="secao-looks" class="animate-in">
            <div class="p-4"><span class="gold-tag uppercase">Novidades da Semana</span></div>
            <div id="galeria-looks" class="catalog-grid"></div>
        </div>

        <div id="secao-costuras" class="hidden animate-in">
            <div class="p-4"><span class="gold-tag uppercase">Serviços de Ateliê</span></div>
            <div class="px-4 mb-4">
                <div class="bg-black text-white p-6 rounded-2xl">
                    <h4 class="font-serif text-xl mb-2">Consertos & Reformas</h4>
                    <p class="text-[10px] opacity-80 leading-relaxed uppercase tracking-widest">Ajustes de barra, cintura, troca de zíper e transformações completas.</p>
                </div>
            </div>
            <div id="galeria-costuras" class="catalog-grid"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-[100]">
        <a href="#" class="flex flex-col items-center gap-1 text-black">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[8px] font-bold uppercase">Início</span>
        </a>
        <a href="https://wa.me/5571993083959" target="_blank" class="bg-black text-white w-12 h-12 rounded-full flex items-center justify-center -mt-10 shadow-xl border-4 border-white">
            <i class="fa-solid fa-comment-dots text-xl"></i>
        </a>
        <a href="https://instagram.com/fitech_cell" target="_blank" class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fa-brands fa-instagram text-lg"></i>
            <span class="text-[8px] font-bold uppercase">Insta</span>
        </a>
    </nav>

    <script>
        let currentTab = 'looks';
        const inputFoto = document.getElementById('inputFoto');
        const uploadLabel = document.getElementById('upload-label');

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('secao-looks').classList.toggle('hidden', tab !== 'looks');
            document.getElementById('secao-costuras').classList.toggle('hidden', tab !== 'costuras');
            
            document.getElementById('btn-looks').className = `flex-1 py-3 text-xs uppercase tracking-widest ${tab === 'looks' ? 'tab-active' : 'tab-inactive'}`;
            document.getElementById('btn-costuras').className = `flex-1 py-3 text-xs uppercase tracking-widest ${tab === 'costuras' ? 'tab-active' : 'tab-inactive'}`;
            
            uploadLabel.innerText = tab === 'looks' ? 'Adicionar ao Catálogo de Looks' : 'Adicionar Foto de Costura/Ajuste';
        }

        window.onload = () => {
            carregarFotos('looks');
            carregarFotos('costuras');
        };

        inputFoto.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64 = event.target.result;
                    salvarFoto(base64, currentTab);
                    renderizarFoto(base64, currentTab);
                };
                reader.readAsDataURL(file);
            }
        });

        function salvarFoto(base64, tab) {
            const key = `deda_fotos_${tab}`;
            const salvas = JSON.parse(localStorage.getItem(key) || '[]');
            salvas.push(base64);
            localStorage.setItem(key, JSON.stringify(salvas));
        }

        function carregarFotos(tab) {
            const key = `deda_fotos_${tab}`;
            const salvas = JSON.parse(localStorage.getItem(key) || '[]');
            salvas.forEach(foto => renderizarFoto(foto, tab));
        }

        function removerFoto(elemento, base64, tab) {
            const key = `deda_fotos_${tab}`;
            let salvas = JSON.parse(localStorage.getItem(key) || '[]');
            salvas = salvas.filter(f => f !== base64);
            localStorage.setItem(key, JSON.stringify(salvas));
            elemento.closest('.item-card').remove();
        }

        function renderizarFoto(base64, tab) {
            const galeria = document.getElementById(`galeria-${tab}`);
            const div = document.createElement('div');
            div.className = 'item-card relative group bg-white overflow-hidden animate-in';
            div.innerHTML = `
                <div class="aspect-[3/4] bg-gray-100">
                    <img src="${base64}" class="w-full h-full object-cover">
                </div>
                <button onclick="removerFoto(this, '${base64}', '${tab}')" class="delete-btn absolute top-2 right-2 bg-red-500 text-white w-7 h-7 rounded-full items-center justify-center z-20">
                    <i class="fa-solid fa-xmark text-xs"></i>
                </button>
                <div class="p-2">
                    <h5 class="text-[10px] font-bold uppercase truncate">${tab === 'looks' ? 'Look Sob Medida' : 'Ajuste Realizado'}</h5>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-[9px] text-gray-400 font-bold tracking-tighter">SALVADOR/BA</span>
                        <i class="fa-solid fa-heart text-[10px] text-gray-200"></i>
                    </div>
                </div>
            `;
            galeria.prepend(div);
        }
    </script>
</body>
</html>
