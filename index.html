<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Veste Deda | Ateliê Salvador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF9F6; color: #1A1A1A; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .gold-border { border: 1px solid rgba(197, 165, 114, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .delete-btn { display: none; }
        .group:hover .delete-btn { display: block; }
    </style>
</head>
<body class="pb-24">

    <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-[100]">
        <a href="https://www.instagram.com/fitech_cell" target="_blank" class="bg-black w-14 h-14 rounded-full flex items-center justify-center text-[#C5A572] text-2xl shadow-xl transform active:scale-90 transition">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://wa.me/5571993083959" target="_blank" class="bg-[#25D366] w-14 h-14 rounded-full flex items-center justify-center text-white text-3xl shadow-xl transform active:scale-90 transition">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
    </div>

    <header class="p-6 text-center">
        <h1 class="font-serif text-4xl font-bold tracking-tight text-black">ME VESTE <span class="text-[#C5A572]">DEDA</span></h1>
        <p class="text-[10px] tracking-[0.4em] text-gray-400 uppercase mt-2 italic">Costura Sob Medida • Salvador</p>
    </header>

    <section class="px-6 mb-10">
        <div class="bg-white p-6 rounded-[32px] shadow-sm border gold-border text-center">
            <h2 class="text-sm font-bold uppercase tracking-widest mb-4">Gerenciar Catálogo</h2>
            <label class="cursor-pointer inline-flex items-center gap-2 bg-[#C5A572] text-white px-6 py-3 rounded-full hover:bg-black transition-all active:scale-95 shadow-lg">
                <i class="fa-solid fa-plus"></i>
                <span class="text-xs font-bold uppercase">Adicionar Novo Look</span>
                <input type="file" id="inputFoto" class="hidden" accept="image/*">
            </label>
            <p class="text-[10px] text-gray-400 mt-4 italic">As fotos ficarão salvas neste navegador.</p>
        </div>
    </section>

    <main class="px-6">
        <h3 class="font-serif text-2xl mb-6">Coleção da Semana</h3>
        <div id="galeria" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <footer class="mt-20 text-center opacity-30 py-10">
        <p class="text-[9px] uppercase tracking-[0.6em]">Deda Ateliê 2026</p>
    </footer>

    <script>
        const inputFoto = document.getElementById('inputFoto');
        const galeria = document.getElementById('galeria');

        // Carregar fotos salvas ao abrir o site
        window.onload = () => {
            const salvas = JSON.parse(localStorage.getItem('me_veste_deda_fotos') || '[]');
            salvas.forEach(foto => renderizarFoto(foto));
        };

        inputFoto.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64 = event.target.result;
                    salvarFoto(base64);
                    renderizarFoto(base64);
                };
                reader.readAsDataURL(file);
            }
        });

        function salvarFoto(base64) {
            const salvas = JSON.parse(localStorage.getItem('me_veste_deda_fotos') || '[]');
            salvas.push(base64);
            localStorage.setItem('me_veste_deda_fotos', JSON.stringify(salvas));
        }

        function removerFoto(elemento, base64) {
            let salvas = JSON.parse(localStorage.getItem('me_veste_deda_fotos') || '[]');
            salvas = salvas.filter(f => f !== base64);
            localStorage.setItem('me_veste_deda_fotos', JSON.stringify(salvas));
            elemento.parentElement.remove();
        }

        function renderizarFoto(base64) {
            const div = document.createElement('div');
            div.className = 'relative group rounded-3xl overflow-hidden aspect-[3/4] bg-gray-100 gold-border';
            div.innerHTML = `
                <img src="${base64}" class="w-full h-full object-cover">
                <button onclick="removerFoto(this, '${base64}')" class="delete-btn absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full shadow-lg">
                    <i class="fa-solid fa-trash-can text-xs"></i>
                </button>
                <div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/60 to-transparent">
                    <p class="text-white text-[10px] font-bold uppercase tracking-tighter">Peça Única</p>
                </div>
            `;
            galeria.prepend(div);
        }
    </script>
</body>
</html>
